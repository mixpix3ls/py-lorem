---
steps:
  - label: "Generate sentence with max 20 characters and dump into file."
    key: "sentence_generation"
    command: "python -c 'import loremipsum; print(loremipsum.sentence(max_char=20))' > result.txt"
    agents:
      queue: "mixpix3ls-macbook-air"
    plugins:
      - docker#v5.13.0:
          image: "python:3.13"
          always-pull: true

  - label: "Annotate the sentence by reading the file"
    depends_on: "sentence_generation"
    command: "cat result.txt | buildkite-agent annotate"
    agents:
      queue: "mixpix3ls-macbook-air"

  - label: "Generate paragraph with max 100 characters"
    depends_on: "sentence_generation"
    command: buildkite-agent annotate < "python -c 'import loremipsum; print(loremipsum.paragraph(max_char=100))'"
