---
steps:
  - label: "Generate sentence with max 20 characters"
    command: "python -c 'import loremipsum; print(loremipsum.sentence(max_char=20))' > result.txt"
    agents:
      queue: "mixpix3ls-macbook-air"
    plugins:
      - docker#v5.13.0:
          image: "python:3.13"
          always-pull: true

  - label: "Annotate the sentence"
    command: "printf '%b\n' \"$(cat $BUILDKITE_BUILD_CHECKOUT_PATH/result.txt)\" | buildkite-agent annotate"
    agents:
      queue: "mixpix3ls-macbook-air"
